<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Pre-Owned Showroom</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .car-card:hover .car-image { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 font-sans min-h-screen">

    <header class="border-b border-gray-900 bg-gray-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="h-9 w-2 bg-amber-500 rounded-full"></div>
                <h1 class="text-xl font-black tracking-wider uppercase text-white">Apex <span class="text-amber-500">Motors</span></h1>
            </div>
            <div class="flex items-center space-x-2 bg-gray-950 px-3 py-1.5 rounded-full border border-gray-800 text-xs">
                <span class="h-2 w-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-gray-400 font-medium">Live Inventory Sync Connected</span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-12">
        <div class="mb-10 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div>
                <h2 class="text-3xl font-extrabold text-white tracking-tight">Current Fleet</h2>
                <p class="text-gray-400 mt-1">Hand-picked premium vehicles, verified and ready for delivery.</p>
            </div>
            <div class="text-sm font-semibold text-amber-500 bg-amber-500/10 border border-amber-500/20 px-4 py-2 rounded-lg">
                Total Fleet: <span id="inventory-count">0</span> Vehicles
            </div>
        </div>

        <div id="loading-state" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <div class="bg-gray-900 h-96 rounded-2xl animate-pulse border border-gray-800"></div>
            <div class="bg-gray-900 h-96 rounded-2xl animate-pulse border border-gray-800"></div>
            <div class="bg-gray-900 h-96 rounded-2xl animate-pulse border border-gray-800"></div>
        </div>

        <div id="empty-state" class="hidden text-center py-20 bg-gray-900/30 rounded-2xl border border-dashed border-gray-800">
            <p class="text-gray-500 text-lg">Your showroom floor is currently empty.</p>
            <p class="text-sm text-gray-600 mt-1">Use your Chrome Scraper extension to push vehicles directly to this screen!</p>
        </div>

        <div id="inventory-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 hidden">
            </div>
    </main>

    <script>
        // REPLACE THIS URL with your live Render app URL once updated (e.g., https://your-app.onrender.com)
        const BACKEND_API_URL = "http://127.0.0.1:8000/api/listings";

        async function fetchShowroomInventory() {
            try {
                const response = await fetch(BACKEND_API_URL);
                if (!response.ok) throw new Error("Network latency detected.");
                
                const vehicles = await response.json();
                renderShowroom(vehicles);
            } catch (err) {
                console.error("Showroom update error:", err);
            }
        }

        function renderShowroom(vehicles) {
            const loadingEl = document.getElementById("loading-state");
            const emptyEl = document.getElementById("empty-state");
            const gridEl = document.getElementById("inventory-grid");
            const countEl = document.getElementById("inventory-count");

            loadingEl.classList.add("hidden");
            countEl.innerText = vehicles.length;

            if (vehicles.length === 0) {
                emptyEl.classList.remove("hidden");
                gridEl.classList.add("hidden");
                return;
            }

            emptyEl.classList.add("hidden");
            gridEl.classList.remove("hidden");

            gridEl.innerHTML = vehicles.map(vehicle => {
                // Ensure a valid display cover photo falls back safely
                const coverPhoto = (vehicle.permanent_photos && vehicle.permanent_photos.length > 0) 
                    ? vehicle.permanent_photos[0] 
                    : "https://images.unsplash.com/photo-1617788138017-80ad40651399?q=80&w=600&auto=format&fit=crop";

                return `
                    <article class="car-card bg-gray-900 rounded-2xl overflow-hidden border border-gray-800/60 transition-all duration-300 hover:border-gray-700 hover:shadow-[0_10px_30px_-10px_rgba(0,0,0,0.7)] flex flex-col group">
                        <div class="relative aspect-video overflow-hidden bg-gray-950">
                            <img src="${coverPhoto}" alt="${vehicle.title}" class="car-image w-full h-full object-cover transition-transform duration-500 ease-out">
                            <div class="absolute top-3 right-3 bg-gray-950/80 backdrop-blur-md px-3 py-1 rounded-full text-xs font-semibold tracking-wide text-amber-500 border border-gray-800">
                                Verified Stock
                            </div>
                        </div>

                        <div class="p-6 flex flex-col flex-grow">
                            <div class="flex justify-between items-start gap-2 mb-2">
                                <h3 class="font-bold text-lg text-white leading-tight tracking-tight group-hover:text-amber-400 transition-colors">${vehicle.title}</h3>
                                <span class="text-xl font-black text-amber-500 whitespace-nowrap">${vehicle.price}</span>
                            </div>

                            <div class="flex flex-wrap gap-2 my-4">
                                <span class="bg-gray-950 border border-gray-800/80 text-gray-300 text-xs px-2.5 py-1 rounded-md font-medium flex items-center">
                                    ⏱️ ${vehicle.mileage}
                                </span>
                                <span class="bg-gray-950 border border-gray-800/80 text-gray-300 text-xs px-2.5 py-1 rounded-md font-medium flex items-center">
                                    ⚙️ ${vehicle.transmission}
                                </span>
                            </div>

                            <p class="text-gray-400 text-xs line-clamp-3 mb-6 leading-relaxed bg-gray-950/40 p-3 rounded-lg border border-gray-800/40">
                                ${vehicle.description}
                            </p>

                            <div class="mt-auto pt-4 border-t border-gray-800/60 flex gap-2">
                                <a href="${vehicle.facebook_source_url}" target="_blank" class="flex-1 bg-gray-800 hover:bg-gray-700 text-white text-center font-bold text-xs py-2.5 px-4 rounded-xl transition-all tracking-wide border border-gray-700/50">
                                    View Original
                                </a>
                                <button onclick="alert('Inquiry routing configuration ready!')" class="flex-1 bg-amber-500 hover:bg-amber-600 text-gray-950 text-center font-extrabold text-xs py-2.5 px-4 rounded-xl transition-all tracking-wide shadow-lg shadow-amber-500/10">
                                    Contact Dealer
                                </button>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');
        }

        // Run Initial Core Setup Fetch on Page Mount
        fetchShowroomInventory();

        // LIVE SYNC POLLING LOOP: Automatically scan the DB every 4 seconds for fresh data injections
        setInterval(fetchShowroomInventory, 4000);
    </script>
</body>
</html>
